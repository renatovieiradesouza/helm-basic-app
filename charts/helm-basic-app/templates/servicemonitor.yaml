{{- if .Values.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    release: monitoring
  name: {{ include "basic-deployment.name" . }}
  namespace: {{ $.Release.Namespace }}
spec:
  endpoints:
  - interval: {{ .Values.serviceMonitor.interval | default "30s" }}
    targetPort: {{ .Values.serviceMonitor.targetPort | default "8081" }}
    path: {{ .Values.serviceMonitor.path | default "/actuator/prometheus"  }}
  namespaceSelector:
    matchNames:
    - {{ $.Release.Namespace }}
  selector:
    matchLabels:
      app: {{ include "basic-deployment.name" . }}
{{- end }}      
