  # runAsNonRoot: true
  # runAsUser: 1000
  # capabilities:
  #   drop:
  #   - ALL

containerPorts: {}
  # - name: http-port
  #   containerPort: 8080
  # - name: management-port
  #   containerPort: 8081

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

########################
##   serviceAccount   ##
######################## 

serviceAccount: {}

########################
##   VolumesTOApps    ##
######################## 
  # Usar para criar volume padrão na pasta /config
  # volumeMounts:
  # - name: config
  #   mountPath: /config            

  # volumes:
  # - name: config
  #   configMap:
  #     name: ms-console-config  
  # Uso exclusivo para microserviços
volumesMount:
  enabled: false

################
##    HPA     ##
################

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

#######################
##    HPA COM KEDA   ##
#######################

keda:
  enabled: true
  pollingInterval: 30
  minReplicaCount: 1
  maxReplicaCount: 1
  cooldownPeriod: 300
  # triggers:
  #   - type: cpu
  #     metricType: Utilization # Allowed types are 'Utilization' or 'AverageValue'
  #     metadata:
  #       value: "80"     
  #   - type: memory
  #     metricType: Utilization # Allowed types are 'Utilization' or 'AverageValue'
  #     metadata:
  #       value: "80"   
  #   # Recomendado para ambiente produtivo, reduzir a carga fora do horário comercial ou manter uma carga fixa      
  #   - type: cron
  #     metadata:
  #       timezone: "America/Sao_Paulo"
              ##   ┌────────── minuto (0 - 59)
              ## │ ┌──────── hora (0 - 23)
              ## │ │ ┌────── dia do mês (* = qualquer dia)
              ## │ │ │ ┌──── mês (* = qualquer mês)
              ## │ │ │ │ ┌── dia da semana (0 = domingo, 6 = sábado)
              ## │ │ │ │ │
              ## │ │ │ │ │
  #       start: "0 5 * * 1-5"
  #       end: "0 20 * * 1-5"
  #       desiredReplicas: "1"

nodeSelector: {}

tolerations: []

affinity: {}

livenessProbe: null
readinessProbe: null



#############
## Service ##
#############

service:
  enabled: true
  type: ClusterIP
  ports: {}
    # - name: http-port
    #   port: 80
    #   targetPort: 8080
    # - name: management-port
    #   port: 8081  
  annotations: {}
  sessionAffinity:
    enabled: false
#  sessionAffinity:
#    enabled: true
#    timeoutSeconds: 1200 # (optional: default 600)

serviceMonitor:
  enabled: true

######################
## External Secrets ##
######################

externalSecrets:
  enabled: false
  refreshInterval: "1m"
  secretStoreRef: "secretstore-eks"

# Usar em conjunto com external secrets
# envFrom:
#  secrets:
#  - name: ui-console
#    optional: false  

###################
## Configuration ##
###################

configMap:
  enabled: false
  mountPath: ""
  data: {}

configMapExternal:
  enabled: false
  directory: "files"
  filePattern: "*.yaml"

secret:
  enabled: false
  mountPath: ""
  data: {}

# this section is to mount an existing secret in the Deployment as a volume.
existingSecrets: []
#-  mountPath: ""
#   secretName: ""
#   subPath: ""
#-  mountPath: ""
#   secretName: ""
#   subPath: ""


#############
## Storage ##
#############

storage:
  enabled: false
  storageClassName: default
  size: 10Gi
  mountPath: /data
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce

  #pv:
  #  name: mypv
  #  annotations: {}
  #  labels: {}
  #  spec: {}

  ## Example EFS
  #storageClassName: efs-sc
  #size: "1Gi" ## ignored by csi
  #mountPath: /my-data
  #volumeMode: Filesystem
  #accessModes:
  #- ReadWriteMany
  #volumeNamePrefix: efs
  #volume:
  #  persistentVolumeReclaimPolicy: Retain
  #  csi:
  #    driver: efs.csi.aws.com
  #    volumeHandle: fs-xxxxxxxx::fsap-xxxxxxxxxxxxxxxxx

###################
##    Ingress    ##
###################

ingress:
  enabled: false
  # if kubernetes above 1.20 and have ingressClassName, inform here
  className: nginx
  # end className
  annotations: {}
  hosts:
  - name: exemplo.com
    # if kubernetes above 1.20 and have ingressClassName, inform here
    pathType: Prefix
    # end pathType
    path: /
  tls:
    enabled: false
    secretName: "exemplo-tls"

## https://helm.sh/docs/topics/charts_hooks/
# pre-install	Executes after templates are rendered, but before any resources are created in Kubernetes
# post-install	Executes after all resources are loaded into Kubernetes
# pre-delete	Executes on a deletion request before any resources are deleted from Kubernetes
# post-delete	Executes on a deletion request after all of the release's resources have been deleted
# pre-upgrade	Executes on an upgrade request after templates are rendered, but before any resources are updated
# post-upgrade	Executes on an upgrade request after all resources have been upgraded
# pre-rollback	Executes on a rollback request after templates are rendered, but before any resources are rolled back
# post-rollback	Executes on a rollback request after all resources have been modified
# test	Executes when the Helm test subcommand is invoked ( view test docs)

